<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Système Solaire 3D</title>
    <style>
        body { margin: 0; overflow: hidden; } 
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <script>
        // TEXTURE
        const textureLoader = new THREE.TextureLoader();
        const sunTexture = textureLoader.load('texture/sunTexture.jpg');

        // SCENE
        const scene = new THREE.Scene();

        // CAMERA
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; 

        // RENDERER
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Sphere 
        const sun_geometry = new THREE.SphereGeometry(1,32,32);
        const sun_material = new THREE.MeshBasicMaterial({ 
            map: sunTexture, 
            wireframe: false });
        const sun = new THREE.Mesh(sun_geometry, sun_material);
        scene.add(sun);

        // ANIMATION
        function animate() {
            requestAnimationFrame(animate);
            
            // ROTATION
            sun.rotation.x += 0.01;
            sun.rotation.y += 0.01;
            
            renderer.render(scene, camera);
        }

        animate(); // LOOP
    </script>
</body>
</html>
