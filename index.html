<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Système Solaire 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: black; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <script>
        // TEXTURE
        const textureLoader = new THREE.TextureLoader();
        const sunTexture = textureLoader.load('texture/sunTexture.jpg');
        const earthTexture = textureLoader.load('texture/earthTexture.jpeg');
        // Ajoute la texture de la lune si tu en as une, sinon utilise une couleur
        // const moonTexture = textureLoader.load('texture/moonTexture.jpeg');

        // SCENE
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8; 
        camera.position.y = 4;

        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);

        // SUN
        const sun_geometry = new THREE.SphereGeometry(1, 32, 32);
        const sun_material = new THREE.MeshBasicMaterial({ map: sunTexture });
        const sun = new THREE.Mesh(sun_geometry, sun_material);
        scene.add(sun);

        const pivot_sun = new THREE.Group();
        scene.add(pivot_sun);

        // EARTH
        const earth_geometry = new THREE.SphereGeometry(0.5, 32, 32);
        const earth_material = new THREE.MeshBasicMaterial({ map: earthTexture });
        const earth = new THREE.Mesh(earth_geometry, earth_material);
        earth.position.x = 4;
        earth.rotation.z = THREE.MathUtils.degToRad(23.5); 
        
        // PIVOT EARTH (Le pivot de la Terre doit être l'enfant du pivot du soleil pour tourner avec lui)
        const pivot_earth = new THREE.Group();
        pivot_earth.position.x = 4; // Position initiale de la Terre par rapport au soleil
        pivot_sun.add(pivot_earth); // On attache le système terrestre au système solaire
        
        // On remet la position x de la terre à 0 car elle est maintenant relative à son pivot (pivot_earth) qui est déjà à x=4
        earth.position.x = 0;
        pivot_earth.add(earth); 

        // EARTH ORBIT
        const orbitRadius = 4; 
        const orbitCurve = new THREE.EllipseCurve(
            0, 0,
            orbitRadius, orbitRadius,
            0, 2 * Math.PI,
            false,
            0
        );

        const points = orbitCurve.getPoints(100); 
        const orbitGeometry = new THREE.BufferGeometry().setFromPoints(points);
        const orbitMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const orbit = new THREE.Line(orbitGeometry, orbitMaterial);
        orbit.rotation.x = Math.PI / 2; 
        scene.add(orbit);

        // MOON
        const moon_geometry = new THREE.SphereGeometry(0.1, 32, 32);
        // Si pas de texture de lune chargée, on met une couleur blanche
        const moon_material = new THREE.MeshBasicMaterial({ color: 0xffffff }); 
        // const moon_material = new THREE.MeshBasicMaterial({ map: moonTexture });
        const moon = new THREE.Mesh(moon_geometry, moon_material);
        moon.position.x = 1; // Distance Terre-Lune
        
        // PIVOT MOON
        const pivot_moon = new THREE.Group();
        pivot_earth.add(pivot_moon); // La lune tourne autour de la terre
        pivot_moon.add(moon);

        // MOON ORBIT
        const moon_orbitRadius = 1; 
        const moon_orbitCurve = new THREE.EllipseCurve(
            0, 0,
            moon_orbitRadius, moon_orbitRadius,
            0, 2 * Math.PI,
            false,
            0
        );

        const moon_points = moon_orbitCurve.getPoints(100); 
        const moon_orbitGeometry = new THREE.BufferGeometry().setFromPoints(moon_points);
        const moon_orbit = new THREE.Line(moon_orbitGeometry, orbitMaterial);
        moon_orbit.rotation.x = Math.PI / 2; 
        pivot_earth.add(moon_orbit); // L'orbite de la lune suit la terre

        function animate() {
            requestAnimationFrame(animate);
            
            sun.rotation.y += 0.005;
            earth.rotation.y += 0.02;
            pivot_sun.rotation.y += 0.002;
            moon.rotation.y += 0.02;
            pivot_moon.rotation.y += 0.01; // Vitesse de rotation de la lune autour de la terre
            
            controls.update(); 
            renderer.render(scene, camera);
        }

        animate(); 

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
