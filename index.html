<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Système Solaire 3D</title>
    <style>
        body { margin: 0; overflow: hidden; } 
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <script>
        // TEXTURE
        const textureLoader = new THREE.TextureLoader();
        const sunTexture = textureLoader.load('texture/sunTexture.jpg');
        const earthTexture = textureLoader.load('texture/earthTexture.jpeg');

        // SCENE
        const scene = new THREE.Scene();

        // CAMERA
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; 

        // RENDERER
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Sun 
        const sun_geometry = new THREE.SphereGeometry(1,32,32);
        const sun_material = new THREE.MeshBasicMaterial({ 
            map: sunTexture, 
            wireframe: false });
        const sun = new THREE.Mesh(sun_geometry, sun_material);
        scene.add(sun);
        
        // Earth
        const earth_geometry= new THREE.SphereGeometry(0.5,32,32);
        const earth_material= new THREE.MeshBasicMaterial({ 
            map: earthTexture, 
            wireframe: false });
        const earth = new THREE.Mesh(earth_geometry, earth_material);
        earth.position.x = 3;
        scene.add(earth);

        // PIVOT
        const pivot = new THREE.Group();
        scene.add(pivot);
        pivot.add(earth);
        
        // ANIMATION
        function animate() {
            requestAnimationFrame(animate);
            
            // ROTATION
            sun.rotation.y += 0.005; 
            earth.rotation.y += 0.02; 
            pivot.rotation.y += 0.002; 
            
            renderer.render(scene, camera);
        }

        animate(); // LOOP
    </script>
</body>
</html>
